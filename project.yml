name: Murmur
options:
  deploymentTarget:
    macOS: "13.0"
packages:
  MurmurKit:
    path: ./MurmurKit
  Moonshine:
    url: https://github.com/moonshine-ai/moonshine-swift.git
    from: 0.0.49
targets:
  Murmur:
    type: application
    platform: macOS
    sources:
      - path: Murmur
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.murmurapp.murmur
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        CODE_SIGN_ENTITLEMENTS: Murmur/Murmur.entitlements
        SWIFT_VERSION: 6.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Murmur needs microphone access for dictation.
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: MurmurKit
        product: MurmurKit
      - package: Moonshine
        product: Moonshine
