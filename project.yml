name: Voce
options:
  deploymentTarget:
    macOS: "26.0"
packages:
  VoceKit:
    path: ./VoceKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.6.4
targets:
  Voce:
    type: application
    platform: macOS
    sources:
      - path: Voce
        excludes:
          - Info.plist
          - Info-Dev.plist
    resources:
      - path: Voce/processing-background.mp4
    settings:
      base:
        PRODUCT_NAME: Voce
        PRODUCT_BUNDLE_IDENTIFIER: io.voceapp.voce
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        CODE_SIGN_ENTITLEMENTS: Voce/Voce.entitlements
        SWIFT_VERSION: 6.0
        MARKETING_VERSION: 0.4.41
        CURRENT_PROJECT_VERSION: 44
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Voce/Info.plist
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: VoceKit
        product: VoceKit
      - package: Sparkle
        product: Sparkle
  VoceDev:
    type: application
    platform: macOS
    sources:
      - path: Voce
        excludes:
          - Info.plist
          - Info-Dev.plist
    resources:
      - path: Voce/processing-background.mp4
    settings:
      base:
        PRODUCT_NAME: Voce Dev
        PRODUCT_BUNDLE_IDENTIFIER: io.voceapp.voce.dev
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconDev
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        CODE_SIGN_ENTITLEMENTS: Voce/Voce.entitlements
        SWIFT_VERSION: 6.0
        MARKETING_VERSION: 0.4.41
        CURRENT_PROJECT_VERSION: 44
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Voce/Info-Dev.plist
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: VoceKit
        product: VoceKit
      - package: Sparkle
        product: Sparkle
  VoceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VoceTests
    dependencies:
      - target: Voce
      - package: VoceKit
        product: VoceKit
