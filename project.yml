name: Voce
options:
  deploymentTarget:
    macOS: "26.0"
packages:
  VoceKit:
    path: ./VoceKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.6.4
targets:
  Voce:
    type: application
    platform: macOS
    sources:
      - path: Voce
    resources:
      - path: Voce/processing-background.mp4
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.voceapp.voce
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        CODE_SIGN_ENTITLEMENTS: Voce/Voce.entitlements
        SWIFT_VERSION: 6.0
        MARKETING_VERSION: 0.4.32
        CURRENT_PROJECT_VERSION: 35
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Voce/Info.plist
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: VoceKit
        product: VoceKit
      - package: Sparkle
        product: Sparkle
