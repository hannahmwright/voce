name: Voce
options:
  deploymentTarget:
    macOS: "13.0"
packages:
  VoceKit:
    path: ./VoceKit
  Moonshine:
    url: https://github.com/moonshine-ai/moonshine-swift.git
    from: 0.0.49
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.6.4
targets:
  Voce:
    type: application
    platform: macOS
    sources:
      - path: Voce
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.voceapp.voce
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        CODE_SIGN_ENTITLEMENTS: Voce/Voce.entitlements
        SWIFT_VERSION: 6.0
        MARKETING_VERSION: 0.4.3
        CURRENT_PROJECT_VERSION: 6
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Voce needs microphone access for dictation.
        INFOPLIST_KEY_SUFeedURL: https://raw.githubusercontent.com/hannahmwright/voce/main/appcast.xml
        INFOPLIST_KEY_SUPublicEDKey: K4AyNtpNz8GmLk6dsAWKGHBqs3bpSLUnrInDL6pJN4c=
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: VoceKit
        product: VoceKit
      - package: Moonshine
        product: Moonshine
      - package: Sparkle
        product: Sparkle
